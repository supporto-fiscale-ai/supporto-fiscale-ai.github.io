<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Professionisti</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="glass-panel login-card">
            <h2 class="gradient-text">AI Professionisti</h2>
            <p>Accedi all'Assistente Legale Avanzato</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="input-field" required autocomplete="username" placeholder="Inserisci username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="input-field" required autocomplete="current-password" placeholder="Inserisci password">
                </div>
                
                <div id="errorMessage" class="error-message"></div>
                
                <button type="submit" id="loginBtn" class="btn-primary" style="width: 100%; margin-top: 10px;">
                    Accedi in Sicurezza
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
